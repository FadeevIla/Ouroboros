# .github/workflows/bot_runner.yml
# Дарвин: запуск телеграм-бота
# Запускается каждые 10 минут + при каждом пуше в main

name: Run Darwin Bot

on:
  schedule:
    - cron: '*/10 * * * *'  # каждые 10 минут
  workflow_dispatch:         # ручной запуск
  push:                      # ← НОВОЕ: запуск при пуше
    branches:
      - main
    paths:
      - 'bot.py'             # только если изменился bot.py

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установка зависимостей
        run: pip install PyGithub pyflakes requests python-dotenv openai

      - name: Запуск Дарвина
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          # Запускаем бота на 9 минут
          timeout 540 python bot.py || true